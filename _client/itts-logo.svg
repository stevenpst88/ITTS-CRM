<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 60" width="160" height="60">
  <!-- Globe icon -->
  <g transform="translate(8, 8)">
    <!-- Outer circle -->
    <circle cx="22" cy="22" r="20" fill="none" stroke="#1a3c7a" stroke-width="2"/>
    <!-- Equator -->
    <ellipse cx="22" cy="22" rx="20" ry="8" fill="none" stroke="#1a3c7a" stroke-width="1.5"/>
    <!-- Vertical meridian -->
    <ellipse cx="22" cy="22" rx="10" ry="20" fill="none" stroke="#1a3c7a" stroke-width="1.5"/>
    <!-- Horizontal latitude lines -->
    <line x1="3" y1="14" x2="41" y2="14" stroke="#1a3c7a" stroke-width="1.2"/>
    <line x1="3" y1="30" x2="41" y2="30" stroke="#1a3c7a" stroke-width="1.2"/>
    <!-- Clip to circle -->
    <circle cx="22" cy="22" r="20" fill="none" stroke="#1a3c7a" stroke-width="2"/>
  </g>
  <!-- ITTS text -->
  <text x="56" y="40" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="28" fill="#1a3c7a" letter-spacing="1">ITTS</text>
</svg>
